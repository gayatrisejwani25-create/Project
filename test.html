<!DOCTYPE html>
<html>
<head>
    <title>Full Screen Image</title>
    <style>
        html, body {
            margin: 0;
            height: 100%;
        }

        img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* makes image fill screen properly */
        }
    </style>
</head>
<body>

    <!-- 👇 PASTE YOUR IMAGE FILE NAME HERE -->
    <img src="YOUR_IMAGE_NAME.jpg" alt="Full Screen Image">

</body>
</html>
